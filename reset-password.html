<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ForexGreek</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d0d14'/%3E%3Crect x='5' y='8' width='6' height='12' rx='1' fill='%2300c853'/%3E%3Crect x='13' y='13' width='6' height='10' rx='1' fill='%23ff1744'/%3E%3Crect x='21' y='7' width='6' height='13' rx='1' fill='%2300c853'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', sans-serif;
      background: #080b09;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,200,83,0.06) 0%, transparent 65%);
      pointer-events: none;
    }
    .card {
      position: relative;
      background: #0f1410;
      border: 1px solid rgba(0,200,83,0.18);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(0,200,83,0.06);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      border-radius: 9px;
      background: linear-gradient(135deg, #00c853, #00a152);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #000;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
    }
    .logo-name { font-size: 1.1rem; font-weight: 700; color: #fff; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .sub { color: #6b7280; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 13px; color: #9ca3af; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-size: 15px;
      font-family: 'Geist', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: rgba(0,200,83,0.5); }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #00c853, #00a152);
      color: #000;
      font-weight: 700;
      font-size: 15px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 20px rgba(0,200,83,0.3);
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 0 32px rgba(0,200,83,0.5); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }
    .msg.success { background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.3); color: #69f0ae; }
    .msg.error   { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #4b5563; text-decoration: none; }
    .back:hover { color: #00c853; }
    .error-hint { font-size: 12px; color: #f87171; margin-top: -10px; margin-bottom: 14px; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">FG</div>
    <span class="logo-name">ForexGreek</span>
  </div>

  <h1>Reset Password</h1>
  <p class="sub">Enter your new password below. Make it at least 8 characters.</p>

  <div id="form-wrap">
    <label for="np">New Password</label>
    <input type="password" id="np" placeholder="Min 8 characters" />
    <label for="cp">Confirm Password</label>
    <input type="password" id="cp" placeholder="Repeat password" />
    <p class="error-hint" id="mismatch">Passwords do not match</p>
    <button class="btn" id="submitBtn" onclick="doReset()">Set New Password</button>
  </div>

  <div class="msg" id="msg"></div>
  <a href="/" class="back">← Back to ForexGreek</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    document.getElementById('form-wrap').style.display = 'none';
    const msg = document.getElementById('msg');
    msg.textContent = 'Invalid or missing reset link. Please request a new one.';
    msg.className = 'msg error';
    msg.style.display = 'block';
  }

  async function doReset() {
    const np  = document.getElementById('np').value;
    const cp  = document.getElementById('cp').value;
    const btn = document.getElementById('submitBtn');
    const mismatch = document.getElementById('mismatch');
    const msg = document.getElementById('msg');

    mismatch.style.display = 'none';
    msg.style.display = 'none';

    if (np !== cp) { mismatch.style.display = 'block'; return; }
    if (np.length < 8) {
      msg.textContent = 'Password must be at least 8 characters.';
      msg.className = 'msg error';
      msg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating…';

    try {
      const res  = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: np }),
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('form-wrap').style.display = 'none';
        msg.textContent = '✓ ' + data.message + ' Redirecting to home…';
        msg.className = 'msg success';
        msg.style.display = 'block';
        setTimeout(() => window.location.href = '/', 2500);
      } else {
        msg.textContent = data.error || 'Something went wrong. Please try again.';
        msg.className = 'msg error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      }
    } catch {
      msg.textContent = 'Network error. Please try again.';
      msg.className = 'msg error';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    }
  }
</script>
</body>
</html>
